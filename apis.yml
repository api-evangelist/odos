  - name: Odos Token Pricing API
    description: >-
      The Odos Token Pricing API provides real-time price data for 100,000+
      DeFi assets across 15 supported blockchain networks. The pricing data
      is DeFi-native and sourced directly from on-chain liquidity, delivering
      accurate pricing for tokens listed on decentralized exchanges. Available
      as a standalone service through the QuickNode marketplace or as part
      of the core Odos API offering.
