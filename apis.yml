  - name: Odos Liquidity Zaps API
    description: >-
      The Odos Liquidity Zaps API enables streamlined single-transaction
      liquidity provisioning with optimized routing. Users can provide
      liquidity to DeFi protocols using any token combination in a single
      transaction, with Odos handling all intermediate swaps and routing
      automatically to minimize costs and slippage.
