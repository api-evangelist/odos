apis:
  - name: Odos Smart Order Router API
    description: >-
      The Odos Smart Order Router (SOR) API provides REST endpoints for
      obtaining optimal token swap quotes, assembling swap transaction data,
      and executing multi-token swaps across 15 EVM-compatible blockchains.
      The API aggregates liquidity from DEXs, AMMs, on-chain order books,
      lending protocols, and private RFQ systems to maximize trade output
      net of gas costs. Supports simple swaps, advanced market orders,
      limit orders, and cross-chain swaps. SOC 2 Type II compliant.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.odos.xyz/
    baseURL: https://api.odos.xyz
    tags:
