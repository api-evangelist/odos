name: Odos
description: >-
  Odos is a DEX aggregator and smart order routing platform that uses a
  sophisticated optimization algorithm to unify fragmented liquidity and
  maximize the output of every trade. The platform scans 1050+ liquidity
  pools across 15 EVM-compatible chains to find optimal swap routes while
  accounting for gas costs. Since launching in 2022, Odos has facilitated
  over $100B in transaction volume and served 3.2M+ unique wallets. Odos
  provides REST APIs for token swap quotes, optimal routing, slippage
  management, multi-token transaction execution, token pricing, and
  liquidity zap operations.
